name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (build, test, clippy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('engine-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build workspace
        working-directory: engine-rs
        run: cargo build --workspace

      - name: Test workspace
        working-directory: engine-rs
        run: cargo test --workspace

      - name: Clippy
        working-directory: engine-rs
        run: cargo clippy --workspace -- -D warnings

  web:
    name: Web (build, lint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build (CI)
        working-directory: apps/web
        run: pnpm build:ci

      - name: Lint
        working-directory: apps/web
        run: pnpm lint
