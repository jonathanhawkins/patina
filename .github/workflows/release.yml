name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Release validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine-rs/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('engine-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Check formatting
        working-directory: engine-rs
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: engine-rs
        run: cargo clippy --workspace -- -D warnings
        continue-on-error: true

      - name: Run tests
        working-directory: engine-rs
        run: cargo test --workspace

      - name: Build release
        working-directory: engine-rs
        run: cargo build --workspace --release

  release:
    name: Create GitHub Release
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          # Extract changelog section for this version, or use git log
          if [ -f CHANGELOG.md ]; then
            # Try to extract the section for this version
            section=$(sed -n "/^## \[${{ steps.version.outputs.version }}\]/,/^## \[/p" CHANGELOG.md | head -n -1)
            if [ -n "$section" ]; then
              echo "notes<<EOF" >> "$GITHUB_OUTPUT"
              echo "$section" >> "$GITHUB_OUTPUT"
              echo "EOF" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          # Fallback: git log since last tag
          prev_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$prev_tag" ]; then
            range="${prev_tag}..HEAD"
          else
            range="HEAD~20..HEAD"
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "## Changes" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          git log --oneline --no-merges "$range" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Patina Engine v${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
